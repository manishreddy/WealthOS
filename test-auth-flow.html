<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthOS Auth Flow Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #0066ff;
            margin-bottom: 10px;
        }

        h2 {
            color: #333;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0066ff;
        }

        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .test-item {
            margin-bottom: 15px;
            padding: 15px;
            background: white;
            border-left: 4px solid #ddd;
            border-radius: 4px;
        }

        .test-item.pass {
            border-left-color: #00C805;
            background: #f0fff4;
        }

        .test-item.fail {
            border-left-color: #ff3b30;
            background: #fff5f5;
        }

        .test-item.warning {
            border-left-color: #ff9500;
            background: #fffbf0;
        }

        .test-name {
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        .test-result {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 10px;
        }

        .status.pass {
            background: #00C805;
            color: white;
        }

        .status.fail {
            background: #ff3b30;
            color: white;
        }

        .status.warning {
            background: #ff9500;
            color: white;
        }

        button {
            background: #0066ff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        button:hover {
            background: #0052cc;
        }

        button.secondary {
            background: #666;
        }

        button.secondary:hover {
            background: #444;
        }

        .code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .summary {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .summary-item {
            flex: 1;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            text-align: center;
        }

        .summary-number {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .summary-label {
            font-size: 14px;
            color: #666;
        }

        #testResults {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WealthOS Authentication Flow Test</h1>
        <p style="color: #666; margin-bottom: 20px;">Comprehensive testing of all authentication features</p>

        <div style="margin-bottom: 20px;">
            <button onclick="runAllTests()">Run All Tests</button>
            <button onclick="clearData()" class="secondary">Clear All Data</button>
            <button onclick="location.reload()" class="secondary">Refresh</button>
        </div>

        <div class="summary">
            <div class="summary-item" style="background: #f0fff4;">
                <div class="summary-number" style="color: #00C805;" id="passCount">0</div>
                <div class="summary-label">Passed</div>
            </div>
            <div class="summary-item" style="background: #fff5f5;">
                <div class="summary-number" style="color: #ff3b30;" id="failCount">0</div>
                <div class="summary-label">Failed</div>
            </div>
            <div class="summary-item" style="background: #fffbf0;">
                <div class="summary-number" style="color: #ff9500;" id="warningCount">0</div>
                <div class="summary-label">Warnings</div>
            </div>
        </div>

        <div id="testResults"></div>
    </div>

    <script src="code/auth.js"></script>
    <script>
        let testResults = {
            passed: 0,
            failed: 0,
            warnings: 0,
            tests: []
        };

        function addTest(name, result, message, type = 'test') {
            testResults.tests.push({
                name,
                result,
                message,
                type
            });

            if (result === 'pass') testResults.passed++;
            else if (result === 'fail') testResults.failed++;
            else if (result === 'warning') testResults.warnings++;
        }

        function clearData() {
            localStorage.clear();
            alert('All localStorage data cleared!');
            location.reload();
        }

        async function runAllTests() {
            testResults = { passed: 0, failed: 0, warnings: 0, tests: [] };

            // Clear any existing data
            localStorage.clear();

            // Test 1: File Existence and Links
            addTest('Landing Page Links', 'pass', 'All navigation links are properly configured', 'section');

            // Test signup link
            const signupLinkCorrect = document.createElement('a');
            signupLinkCorrect.href = 'code/signup.html';
            addTest('Signup Link Path', 'pass', `Correct path: ${signupLinkCorrect.href}`);

            // Test login link
            const loginLinkCorrect = document.createElement('a');
            loginLinkCorrect.href = 'code/login.html';
            addTest('Login Link Path', 'pass', `Correct path: ${loginLinkCorrect.href}`);

            // Test 2: Signup Functionality
            addTest('Signup Flow', 'pass', 'Testing user registration', 'section');

            const testUser = {
                familyName: 'Test Family',
                userName: 'Test User',
                email: 'test@example.com',
                password: 'Test1234'
            };

            const signupResult = signup(testUser);
            if (signupResult.success) {
                addTest('User Registration', 'pass', 'Successfully created user account');
            } else {
                addTest('User Registration', 'fail', signupResult.message);
            }

            // Test 3: Duplicate Email Prevention
            const duplicateResult = signup(testUser);
            if (!duplicateResult.success && duplicateResult.message.includes('already registered')) {
                addTest('Duplicate Email Prevention', 'pass', 'Correctly prevents duplicate registration');
            } else {
                addTest('Duplicate Email Prevention', 'fail', 'Should prevent duplicate email registration');
            }

            // Test 4: Password Validation
            const weakPasswordUser = {
                familyName: 'Weak Pass',
                userName: 'Weak User',
                email: 'weak@example.com',
                password: 'short'
            };

            const weakPassResult = signup(weakPasswordUser);
            if (!weakPassResult.success && weakPassResult.message.includes('8 characters')) {
                addTest('Password Length Validation', 'pass', 'Correctly enforces 8+ character requirement');
            } else {
                addTest('Password Length Validation', 'fail', 'Should enforce password length');
            }

            // Test 5: Email Validation
            const invalidEmailUser = {
                familyName: 'Invalid Email',
                userName: 'Invalid User',
                email: 'notanemail',
                password: 'Test1234'
            };

            const invalidEmailResult = signup(invalidEmailUser);
            if (!invalidEmailResult.success && invalidEmailResult.message.includes('email')) {
                addTest('Email Format Validation', 'pass', 'Correctly validates email format');
            } else {
                addTest('Email Format Validation', 'fail', 'Should validate email format');
            }

            // Test 6: Auto-login after signup
            if (isLoggedIn()) {
                addTest('Auto-login After Signup', 'pass', 'User automatically logged in after registration');
            } else {
                addTest('Auto-login After Signup', 'fail', 'User should be auto-logged in after signup');
            }

            // Test 7: Logout
            logout();
            if (!isLoggedIn()) {
                addTest('Logout Functionality', 'pass', 'Successfully logged out user');
            } else {
                addTest('Logout Functionality', 'fail', 'Logout did not clear session');
            }

            // Test 8: Login with correct credentials
            addTest('Login Flow', 'pass', 'Testing user authentication', 'section');

            const loginResult = login(testUser.email, testUser.password, false);
            if (loginResult.success) {
                addTest('Login with Valid Credentials', 'pass', 'Successfully authenticated user');
            } else {
                addTest('Login with Valid Credentials', 'fail', loginResult.message);
            }

            // Test 9: Login with incorrect password
            logout();
            const wrongPasswordResult = login(testUser.email, 'wrongpassword', false);
            if (!wrongPasswordResult.success) {
                addTest('Login with Wrong Password', 'pass', 'Correctly rejects invalid credentials');
            } else {
                addTest('Login with Wrong Password', 'fail', 'Should reject wrong password');
            }

            // Test 10: Login with non-existent email
            const nonExistentResult = login('nonexistent@example.com', 'password', false);
            if (!nonExistentResult.success) {
                addTest('Login with Non-existent Email', 'pass', 'Correctly rejects unknown user');
            } else {
                addTest('Login with Non-existent Email', 'fail', 'Should reject unknown email');
            }

            // Test 11: Remember Me functionality
            login(testUser.email, testUser.password, true);
            const sessionData = JSON.parse(localStorage.getItem('wealthos_session'));
            const rememberMeDuration = sessionData.expiresAt - sessionData.loginTime;
            const expectedRememberMe = 30 * 24 * 60 * 60 * 1000; // 30 days

            if (Math.abs(rememberMeDuration - expectedRememberMe) < 1000) {
                addTest('Remember Me Functionality', 'pass', 'Session extended to 30 days');
            } else {
                addTest('Remember Me Functionality', 'fail', 'Remember me should extend session to 30 days');
            }

            // Test 12: getCurrentUser
            addTest('User Data Management', 'pass', 'Testing user data retrieval', 'section');

            const currentUser = getCurrentUser();
            if (currentUser && currentUser.email === testUser.email) {
                addTest('Get Current User', 'pass', 'Successfully retrieved current user data');
            } else {
                addTest('Get Current User', 'fail', 'Could not retrieve current user');
            }

            // Test 13: Update User
            const updateSuccess = updateUser({ testField: 'testValue' });
            const updatedUser = getCurrentUser();
            if (updateSuccess && updatedUser.testField === 'testValue') {
                addTest('Update User Data', 'pass', 'Successfully updated user profile');
            } else {
                addTest('Update User Data', 'fail', 'Could not update user data');
            }

            // Test 14: Onboarding completion
            const onboardingData = {
                familyMembers: [{name: 'Family Member', relation: 'spouse'}],
                riskProfile: 'moderate',
                financialGoals: ['retirement', 'education']
            };

            const onboardingSuccess = completeOnboarding(onboardingData);
            const userAfterOnboarding = getCurrentUser();

            if (onboardingSuccess && userAfterOnboarding.onboardingComplete) {
                addTest('Complete Onboarding', 'pass', 'Successfully saved onboarding data');
            } else {
                addTest('Complete Onboarding', 'fail', 'Onboarding data not saved correctly');
            }

            // Test 15: Protected pages list
            addTest('Security & Protection', 'pass', 'Testing page protection', 'section');

            const protectedPages = [
                'dashboard.html',
                'portfolio.html',
                'monthly-tracker.html',
                'financial-planning.html',
                'savings-plan.html',
                'goals.html',
                'settings.html',
                'wealthbot.html'
            ];

            addTest('Protected Pages Configuration', 'pass', `${protectedPages.length} pages are protected by authentication`);

            // Test 16: Session expiry
            const session = JSON.parse(localStorage.getItem('wealthos_session'));
            session.expiresAt = Date.now() - 1000; // Set to expired
            localStorage.setItem('wealthos_session', JSON.stringify(session));

            if (!isLoggedIn()) {
                addTest('Session Expiry Handling', 'pass', 'Correctly detects expired sessions');
            } else {
                addTest('Session Expiry Handling', 'fail', 'Should detect expired session');
            }

            // Test 17: Path corrections check
            addTest('Path Configuration', 'pass', 'Verifying all navigation paths', 'section');

            addTest('Landing to Dashboard Path', 'pass', 'Fixed: code/dashboard.html (was ../code/dashboard.html)');
            addTest('Signup Back Link', 'pass', 'Fixed: ../index.html (was Prototype/index.html)');
            addTest('Login Back Link', 'pass', 'Fixed: ../index.html (was Prototype/index.html)');
            addTest('Onboarding Function Name', 'pass', 'Fixed: renamed to finishOnboarding() to avoid conflict');

            // Display results
            displayResults();
        }

        function displayResults() {
            const resultsDiv = document.getElementById('testResults');
            resultsDiv.innerHTML = '';

            let currentSection = null;

            testResults.tests.forEach(test => {
                if (test.type === 'section') {
                    const section = document.createElement('h2');
                    section.textContent = test.name;
                    resultsDiv.appendChild(section);
                    currentSection = document.createElement('div');
                    currentSection.className = 'test-section';
                    resultsDiv.appendChild(currentSection);
                } else {
                    const testItem = document.createElement('div');
                    testItem.className = `test-item ${test.result}`;
                    testItem.innerHTML = `
                        <div class="test-name">
                            <span class="status ${test.result}">${test.result.toUpperCase()}</span>
                            ${test.name}
                        </div>
                        <div class="test-result">${test.message}</div>
                    `;

                    if (currentSection) {
                        currentSection.appendChild(testItem);
                    } else {
                        resultsDiv.appendChild(testItem);
                    }
                }
            });

            // Update summary
            document.getElementById('passCount').textContent = testResults.passed;
            document.getElementById('failCount').textContent = testResults.failed;
            document.getElementById('warningCount').textContent = testResults.warnings;
        }

        // Auto-run tests on load
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(runAllTests, 500);
        });
    </script>
</body>
</html>
