<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — WealthOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="design-system.css">
    <style>
        body {
            background: var(--bg);
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .wrap {
            width: 100%;
            max-width: 440px;
            padding: 40px 24px;
            text-align: center;
            animation: dsFadeIn 0.35s var(--ease) both;
        }
        .brand-logo-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 40px;
        }
        .brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brand-name {
            font-size: 1.125rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.04em;
        }
        .brand-name em { font-style: normal; color: var(--accent); }
        .page-title {
            font-size: 1.875rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .page-sub {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            margin-bottom: 36px;
            line-height: 1.55;
        }
        .login-btn {
            width: 100%;
            height: 52px;
            background: var(--text-primary);
            color: var(--bg);
            border: none;
            border-radius: 10px;
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 150ms;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 16px;
        }
        .login-btn:hover { opacity: 0.88; }
        .provider-list {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 16px;
            margin-bottom: 24px;
        }
        .provider-badge {
            font-size: 0.8125rem;
            color: var(--text-tertiary);
            background: var(--card-light-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px;
        }
        .auth-security {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 16px;
            font-size: 0.8125rem;
            color: var(--text-tertiary);
        }
        .already-link {
            display: block;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 24px;
        }
        .already-link a {
            color: var(--text-primary);
            font-weight: 600;
            text-decoration: none;
        }
        .already-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="wrap">
    <a href="/" class="brand-logo-link">
        <div class="brand-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                <polyline points="17 6 23 6 23 12"/>
            </svg>
        </div>
        <span class="brand-name">Wealth<em>OS</em></span>
    </a>

    <h1 class="page-title">Create your account</h1>
    <p class="page-sub">Sign in with your preferred provider — if you don't have an account yet, one will be created automatically.</p>

    <a href="/api/login" class="login-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Get started — sign in
    </a>

    <div class="provider-list">
        <span class="provider-badge">Google</span>
        <span class="provider-badge">GitHub</span>
        <span class="provider-badge">Apple</span>
        <span class="provider-badge">Email</span>
    </div>

    <div class="auth-security">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Secured via Replit Auth. No password stored by WealthOS.
    </div>

    <div class="already-link">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>

<script>
    (async () => {
      try {
        const res = await fetch('/api/auth/user', { credentials: 'same-origin' });
        if (res.ok) {
          window.location.href = '/dashboard.html';
        }
      } catch (e) {}
    })();
</script>
</body>
</html>
