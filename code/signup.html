<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — WealthOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="design-system.css">
    <style>
        body {
            background: var(--bg);
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .wrap {
            width: 100%;
            max-width: 440px;
            padding: 40px 24px;
            animation: dsFadeIn 0.35s var(--ease) both;
        }
        .brand-logo-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 40px;
        }
        .brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .brand-name {
            font-size: 1.125rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.04em;
        }
        .brand-name em { font-style: normal; color: var(--accent); }
        .page-title {
            font-size: 1.875rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .page-sub {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.55;
        }
        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            height: 48px;
            padding: 0 14px;
            border: 1.5px solid var(--input-border, #CBD5E1);
            border-radius: 10px;
            background: var(--input-bg, #fff);
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 0.9375rem;
            outline: none;
            transition: border-color 150ms;
            box-sizing: border-box;
        }
        .field input:focus { border-color: var(--input-focus-border, #8FE62C); box-shadow: 0 0 0 3px var(--input-focus-ring, rgba(143,230,44,0.15)); }
        .field input::placeholder { color: var(--input-placeholder, #aaa); }
        .submit-btn {
            width: 100%;
            height: 52px;
            background: var(--cta-bg, #8FE62C);
            color: var(--cta-text, #111);
            border: none;
            border-radius: 10px;
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 150ms, transform 150ms;
            letter-spacing: -0.01em;
            margin-top: 8px;
            margin-bottom: 16px;
        }
        .submit-btn:hover { opacity: 0.9; transform: scale(1.01); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .error-msg {
            background: rgba(255,59,59,0.08);
            border: 1px solid rgba(255,59,59,0.2);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.875rem;
            color: #FF3B3B;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.visible { display: block; }
        .auth-security {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 8px;
            font-size: 0.8125rem;
            color: var(--text-tertiary);
        }
        .already-link {
            display: block;
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 20px;
        }
        .already-link a {
            color: var(--text-primary);
            font-weight: 600;
            text-decoration: none;
        }
        .already-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="wrap">
    <a href="/" class="brand-logo-link">
        <div class="brand-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                <polyline points="17 6 23 6 23 12"/>
            </svg>
        </div>
        <span class="brand-name">Wealth<em>OS</em></span>
    </a>

    <h1 class="page-title">Create your account</h1>
    <p class="page-sub">Set up your WealthOS account.</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="signupForm" autocomplete="on">
        <div class="field">
            <label for="inputName">Name</label>
            <input type="text" id="inputName" name="name" placeholder="e.g. Manish" autocomplete="given-name" required>
        </div>
        <div class="field">
            <label for="inputEmail">Email</label>
            <input type="email" id="inputEmail" name="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="field">
            <label for="inputPassword">Password</label>
            <input type="password" id="inputPassword" name="password" placeholder="••••••••" autocomplete="new-password" required>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
    </form>

    <div class="already-link">
        Already have an account? <a href="/login">Sign in</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/supabase-client.js"></script>
<script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn   = document.getElementById('submitBtn');
        const errEl = document.getElementById('errorMsg');
        errEl.classList.remove('visible');
        btn.disabled = true;
        btn.textContent = 'Creating…';

        const name     = document.getElementById('inputName').value.trim();
        const email    = document.getElementById('inputEmail').value.trim();
        const password = document.getElementById('inputPassword').value;

        try {
            const client = await getSupabase();
            const { data, error } = await client.auth.signUp({ email, password });
            if (error) {
                errEl.textContent = error.message;
                errEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }
            // Email confirmation is enabled — session is null until user confirms
            if (!data.session) {
                errEl.style.color = '#16a34a';
                errEl.style.background = '#f0fdf4';
                errEl.style.borderColor = '#bbf7d0';
                errEl.textContent = 'Account created! Check your email to confirm, then sign in.';
                errEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }
            // Provision user row in our DB
            const provRes = await fetch('/api/auth/provision', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + data.session.access_token },
                body: JSON.stringify({ name })
            });
            const provData = await provRes.json();
            if (provData.error) {
                errEl.textContent = provData.error;
                errEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }
            window.location.href = '/dashboard.html';
        } catch (err) {
            errEl.textContent = 'Something went wrong. Please try again.';
            errEl.classList.add('visible');
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    });

    // Auto-redirect if already logged in
    (async () => {
        try {
            const client = await getSupabase();
            const { data: { session } } = await client.auth.getSession();
            if (session) window.location.href = '/dashboard.html';
        } catch (e) {}
    })();
</script>
</body>
</html>
