<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('wealthos_theme')||localStorage.getItem('theme')||'light');</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthBot AI Assistant</title>
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="controls.css">
    <link rel="stylesheet" href="user-menu.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
body {
            font-family: var(--font), 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* App Layout */
        .app-container {
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
        }

        /* Sidebar / Nav */

        /* Main Content */
        .main-content {
            background: var(--bg);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .page-header h1 {
            font-family: var(--font);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .page-header p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* WealthBot Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Quick Actions */
        .quick-actions {
            padding: 16px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .action-chip {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: inherit;
        }

        .action-chip:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.bot .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.user .message-avatar {
            background: var(--hover-bg);
            color: var(--text-secondary);
        }

        .message-content {
            max-width: 65%;
        }

        .message-bubble {
            background: var(--bubble-bot-bg);
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--bubble-bot-color);
            word-break: break-word;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-time {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 4px;
            padding: 0 4px;
        }

        /* Thinking Animation */
        .thinking {
            display: flex;
            gap: 4px;
            padding: 4px 2px;
        }

        .thinking-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: thinking 1.4s infinite;
        }

        .thinking-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .thinking-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes thinking {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        /* Input Area */
        .input-area {
            padding: 16px 32px 24px;
            border-top: 1px solid var(--border-color);
            background: var(--bg);
            flex-shrink: 0;
        }

        .input-container {
            display: flex;
            gap: 8px;
            align-items: center;
            max-width: 800px;
        }

        .message-input {
            flex: 1;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 12px 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease;
            font-family: inherit;
            background: var(--bg);
            color: var(--text-primary);
        }

        .message-input:focus {
            border-color: #667eea;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: none;
            box-shadow: none;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            flex-shrink: 0;
        }

        .clear-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        /* Scrollbar */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
            }

            /* Fixed-height layout: account for mobile top bar */
            .main-content {
                height: calc(100vh - 56px);
                padding: 0 !important;
                overflow-x: hidden;
            }

            .message-content {
                max-width: 85%;
            }

            .quick-actions,
            .chat-container,
            .input-area {
                padding-left: 16px;
                padding-right: 16px;
            }

            .top-bar {
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .quick-actions {
                padding: 12px 16px;
            }
            .action-chip {
                font-size: 12px;
                padding: 6px 12px;
            }
            .input-area {
                padding: 12px 16px 16px;
            }
        }
    </style>
    <link rel="stylesheet" href="dark-overrides.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Nav -->
        <aside id="sidebar-root"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="page-header">
                    <h1>WealthBot</h1>
                    <p>Your AI Financial Advisor — powered by Claude AI</p>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <!-- Quick Action Chips -->
                <div class="quick-actions">
                    <button class="action-chip" onclick="sendQuickAction('What\'s my current net worth breakdown?')">💰 Net worth</button>
                    <button class="action-chip" onclick="sendQuickAction('Analyze my spending patterns from the last 3 months')">📊 Spending insights</button>
                    <button class="action-chip" onclick="sendQuickAction('Am I on track for my financial goals?')">🎯 Goals review</button>
                    <button class="action-chip" onclick="sendQuickAction('What tax-saving investments should I consider this year?')">💡 Tax tips</button>
                </div>

                <!-- Chat Messages -->
                <div class="chat-container" id="chatContainer">
                    <!-- Welcome Message -->
                    <div class="message bot">
                        <div class="message-avatar">🤖</div>
                        <div class="message-content">
                            <div class="message-bubble">
                                Hi! I'm WealthBot, your AI financial advisor powered by Claude AI. I have access to your real financial data and can help with insights, analysis, and personalized recommendations. What would you like to know?
                            </div>
                            <div class="message-time">Just now</div>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-container">
                        <input
                            type="text"
                            class="message-input"
                            id="messageInput"
                            placeholder="Ask me anything about your finances..."
                            onkeypress="handleKeyPress(event)"
                        >
                        <button class="clear-btn" onclick="clearChat()">Clear</button>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                            ➤
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/api.js"></script>
    <script>
        // Conversation history — kept in memory, capped at last 10 messages
        let conversationHistory = [];
        let isProcessing = false;
        const MAX_HISTORY = 10;

        // ── Page load ──────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function () {
            WealthAPI.auth.requireAuth();
            // Theme is applied by sidebar.js before DOMContentLoaded fires
        });

        // ── Key press handler ──────────────────────────────────────────────────
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !isProcessing) {
                sendMessage();
            }
        }

        // ── Quick action chips ─────────────────────────────────────────────────
        function sendQuickAction(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        // ── Send message ───────────────────────────────────────────────────────
        async function sendMessage() {
            if (isProcessing) return;

            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            // Clear input and disable send button
            input.value = '';
            setSendDisabled(true);
            isProcessing = true;

            // Add user message to history and UI
            conversationHistory.push({ role: 'user', content: message });
            trimHistory();
            addUserMessage(message);

            // Show typing indicator
            showThinking();

            try {
                const result = await WealthAPI.wealthbot.chat(message, conversationHistory);
                removeThinking();

                const reply = result.reply;

                // Add assistant reply to history and UI
                conversationHistory.push({ role: 'assistant', content: reply });
                trimHistory();
                addBotMessage(reply);
            } catch (err) {
                removeThinking();
                addBotMessage('Sorry, I couldn\'t connect. Please try again.');
            } finally {
                isProcessing = false;
                setSendDisabled(false);
                input.focus();
            }
        }

        // ── Clear chat ─────────────────────────────────────────────────────────
        function clearChat() {
            conversationHistory = [];
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';

            // Re-add welcome message
            const time = getTime();
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'message bot';
            welcomeDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">
                        Hi! I'm WealthBot, your AI financial advisor powered by Claude AI. I have access to your real financial data and can help with insights, analysis, and personalized recommendations. What would you like to know?
                    </div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            container.appendChild(welcomeDiv);
        }

        // ── Add user message to UI ─────────────────────────────────────────────
        function addUserMessage(text) {
            const container = document.getElementById('chatContainer');
            const time = getTime();

            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `
                <div class="message-avatar">👤</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(text)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            container.appendChild(div);
            scrollToBottom();
        }

        // ── Add bot message to UI ──────────────────────────────────────────────
        function addBotMessage(text) {
            const container = document.getElementById('chatContainer');
            const time = getTime();

            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">${formatMessage(text)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            container.appendChild(div);
            scrollToBottom();
        }

        // ── Typing indicator ───────────────────────────────────────────────────
        function showThinking() {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'message bot';
            div.id = 'thinkingMessage';
            div.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">
                        <div class="thinking">
                            <div class="thinking-dot"></div>
                            <div class="thinking-dot"></div>
                            <div class="thinking-dot"></div>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(div);
            scrollToBottom();
        }

        function removeThinking() {
            const el = document.getElementById('thinkingMessage');
            if (el) el.remove();
        }

        // ── Helpers ────────────────────────────────────────────────────────────

        // Keep history at most MAX_HISTORY entries
        function trimHistory() {
            if (conversationHistory.length > MAX_HISTORY) {
                conversationHistory = conversationHistory.slice(conversationHistory.length - MAX_HISTORY);
            }
        }

        // Escape raw HTML in user-supplied text before inserting into the DOM
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Format bot replies: render newlines as <br> and **bold** as <strong>
        function formatMessage(text) {
            // Escape HTML first, then apply formatting
            let escaped = escapeHtml(text);
            // Bold: **text** → <strong>text</strong>
            escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // Newlines → <br>
            escaped = escaped.replace(/\n/g, '<br>');
            return escaped;
        }

        function getTime() {
            return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        function setSendDisabled(disabled) {
            document.getElementById('sendBtn').disabled = disabled;
        }
    </script>
    <script src="sidebar.js"></script>
</body>
</html>
