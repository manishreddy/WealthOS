<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('wealthos_theme')||localStorage.getItem('theme')||'light');</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthOS – Dashboard</title>
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="controls.css">
    <link rel="stylesheet" href="user-menu.css">
    <link rel="stylesheet" href="dark-overrides.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        body { font-family: var(--font); background: var(--bg); color: var(--text-primary); }

        .app-container { display: grid; grid-template-columns: 240px 1fr; height: 100vh; overflow: hidden; }
        .main-content { padding: 32px 40px; overflow-y: auto; background: var(--bg); height: 100%; }

        /* ── Top bar ─────────────────────────────────────────────────────── */
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
        .page-title { font-size: 1.75rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.04em; margin-bottom: 8px; }

        /* ── Month nav (inside cashflow card) ───────────────────────────── */
        .cashflow-month-nav { display: flex; align-items: center; gap: 8px; }
        .cashflow-month-nav-btn {
            width: 26px; height: 26px; border-radius: 7px;
            border: 1px solid var(--border-strong); background: var(--card-light-bg);
            color: var(--text-secondary); font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.14s; line-height: 1;
        }
        .cashflow-month-nav-btn:hover { background: var(--border); color: var(--text-primary); }
        .cashflow-month-nav-label { font-size: 0.875rem; font-weight: 700; color: var(--text-secondary); letter-spacing: -0.02em; min-width: 110px; text-align: center; }

        /* ── Dashboard grid ──────────────────────────────────────────────── */
        .dashboard-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; margin-bottom: 20px; }

        /* ── Cashflow card ───────────────────────────────────────────────── */
        .cashflow-card {
            grid-column: span 12;
            background: var(--card-light-bg);
            border-radius: var(--card-radius, 14px);
            padding: 24px 28px;
            position: relative; overflow: hidden;
            box-shadow: var(--card-light-shadow);
            border: 1px solid var(--border);
            animation: wos-slide-up 0.4s cubic-bezier(0.22,1,0.36,1) both;
        }
        .cashflow-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cashflow-header-left { display: flex; flex-direction: column; gap: 4px; }
        .cashflow-card-title { font-size: 0.6875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); }
        .cashflow-top { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 24px; }
        .cashflow-income-block { flex: 1; }
        .cashflow-income-label { font-size: 0.75rem; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
        .cashflow-income-value { font-size: 2.25rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.04em; line-height: 1; font-feature-settings: 'tnum' 1; }
        .cashflow-rate-hero { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .cashflow-rate-value { font-size: 2.75rem; font-weight: 800; color: var(--accent, #8FE62C); letter-spacing: -0.04em; line-height: 1; font-feature-settings: 'tnum' 1; display: flex; align-items: baseline; gap: 6px; }
        .cashflow-rate-label { font-size: 0.75rem; color: var(--text-secondary); }
        .cashflow-thumb { font-size: 1.25rem; display: inline-block; }
        .cashflow-thumb.animate { animation: thumb-bounce 0.6s cubic-bezier(0.22,1,0.36,1) both; }
        @keyframes thumb-bounce {
            0%   { transform: scale(0.5) translateY(8px); opacity: 0; }
            60%  { transform: scale(1.3) translateY(-4px); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .cashflow-rows { display: flex; flex-direction: column; gap: 12px; }
        .cashflow-row { display: flex; align-items: center; gap: 12px; }
        .cashflow-row-icon { font-size: 0.875rem; flex-shrink: 0; width: 20px; text-align: center; }
        .cashflow-row-label { font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); width: 86px; flex-shrink: 0; }
        .cashflow-bar-wrap { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .cashflow-bar-fill { height: 100%; border-radius: 4px; transition: width 0.7s cubic-bezier(0.22,1,0.36,1); min-width: 0; }
        .cashflow-row-amount { font-size: 0.9375rem; font-weight: 700; color: var(--text-primary); font-feature-settings: 'tnum' 1; width: 96px; text-align: right; flex-shrink: 0; }
        .cashflow-row-pct { font-size: 0.8125rem; font-weight: 700; color: var(--text-secondary); width: 36px; text-align: right; flex-shrink: 0; }
        .cashflow-row-delta { font-size: 0.6875rem; font-weight: 600; width: 60px; text-align: right; flex-shrink: 0; }
        .cashflow-row-delta.up { color: #5DC840; }
        .cashflow-row-delta.down { color: #FF9500; }
        .cashflow-row-delta.neutral { color: var(--text-tertiary); }
        .cashflow-example-badge { position: absolute; top: 14px; right: 14px; font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); background: var(--border); padding: 3px 8px; border-radius: 20px; }
        /* Firework / confetti burst for excellent savings */
        .cashflow-card.savings-excellent::after {
            content: '';
            position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse at 80% 20%, rgba(143,230,44,0.08) 0%, transparent 60%);
            animation: wos-fade-in 0.5s ease both;
        }
        .savings-good .cashflow-rate-value { color: var(--accent, #8FE62C); }
        .savings-excellent .cashflow-rate-value { color: var(--accent, #8FE62C); }
        .savings-poor .cashflow-rate-value { color: var(--viz-expense, #FF9500); }

        /* ── Mid-row: 2-col layout ───────────────────────────────────────── */
        .mid-row { grid-column: span 12; display: grid; grid-template-columns: 7fr 5fr; gap: 20px; }

        /* ── Portfolio summary ───────────────────────────────────────────── */
        .portfolio-summary-card { background: var(--card-light-bg); border-radius: var(--card-radius, 14px); padding: 24px; box-shadow: var(--card-light-shadow); border: 1px solid var(--border); }
        .ps-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .ps-title { font-size: 0.6875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); }
        .ps-link { font-size: 0.8125rem; font-weight: 700; color: var(--accent-dark, #5FA518); text-decoration: none; transition: opacity 0.15s; }
        .ps-link:hover { opacity: 0.75; }
        [data-theme="dark"] .ps-link { color: var(--accent, #8FE62C); }
        .ps-networth { font-size: 2rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.04em; font-feature-settings: 'tnum' 1; margin-bottom: 2px; }
        .ps-networth-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 20px; }
        .ps-allocation-list { display: flex; flex-direction: column; gap: 11px; }
        .ps-row { display: flex; align-items: center; gap: 10px; }
        .ps-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .ps-class { font-size: 0.875rem; font-weight: 600; color: var(--text-primary); width: 90px; flex-shrink: 0; }
        .ps-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .ps-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
        .ps-pct { font-size: 0.875rem; font-weight: 700; color: var(--text-primary); width: 36px; text-align: right; flex-shrink: 0; font-feature-settings: 'tnum' 1; }
        .ps-val { font-size: 0.8125rem; color: var(--text-secondary); width: 80px; text-align: right; flex-shrink: 0; font-feature-settings: 'tnum' 1; }
        .ps-example-badge { display: inline-block; font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); background: var(--border); padding: 2px 7px; border-radius: 20px; margin-bottom: 8px; }

        /* ── Goals snapshot ──────────────────────────────────────────────── */
        .goals-snapshot-card { background: var(--card-light-bg); border-radius: var(--card-radius, 14px); padding: 24px; box-shadow: var(--card-light-shadow); border: 1px solid var(--border); }
        .gs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .gs-title { font-size: 0.6875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); }
        .gs-link { font-size: 0.8125rem; font-weight: 700; color: var(--accent-dark, #5FA518); text-decoration: none; transition: opacity 0.15s; }
        .gs-link:hover { opacity: 0.75; }
        [data-theme="dark"] .gs-link { color: var(--accent, #8FE62C); }
        .goals-compact-list { display: flex; flex-direction: column; gap: 4px; }
        .goal-compact-row { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; transition: background 0.14s; cursor: pointer; }
        .goal-compact-row:hover { background: var(--hover-bg); }
        .goal-compact-icon { font-size: 1.25rem; flex-shrink: 0; width: 26px; text-align: center; line-height: 1; }
        .goal-compact-body { flex: 1; min-width: 0; }
        .goal-compact-name { font-size: 0.8125rem; font-weight: 600; color: var(--text-primary); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .goal-compact-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .goal-compact-bar-fill { height: 100%; background: var(--accent, #8FE62C); border-radius: 2px; transition: width 0.5s ease; }
        .goal-compact-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; min-width: 52px; }
        .goal-compact-pct { font-size: 0.875rem; font-weight: 700; color: var(--text-primary); font-feature-settings: 'tnum' 1; }
        .goal-compact-time { font-size: 0.6875rem; color: var(--text-tertiary); }
        .gs-example-badge { display: inline-block; font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); background: var(--border); padding: 2px 7px; border-radius: 20px; margin-bottom: 8px; }
        .gs-empty-cta { font-size: 0.8125rem; font-weight: 700; color: var(--accent-dark, #5FA518); text-decoration: none; border: 1px solid var(--accent-dark, #5FA518); padding: 5px 14px; border-radius: 20px; display: inline-block; transition: all 0.15s; }
        .gs-empty-cta:hover { background: var(--accent-dark, #5FA518); color: #fff; }
        [data-theme="dark"] .gs-empty-cta { color: var(--accent, #8FE62C); border-color: var(--accent, #8FE62C); }

        /* ── Family Setup Widget ─────────────────────────────────────────── */
        .family-setup-widget {
            grid-column: span 12; background: var(--card-light-bg); border-radius: var(--card-radius, 14px);
            border: 1px solid var(--border); border-left: 4px solid var(--accent, #8FE62C);
            padding: 24px 28px;
            display: flex; align-items: center; gap: 24px;
            box-shadow: var(--card-light-shadow);
            animation: wos-slide-up 0.4s cubic-bezier(0.22,1,0.36,1) 0.1s both;
            position: relative;
        }
        .family-widget-icon { font-size: 2.25rem; flex-shrink: 0; }
        .family-widget-body { flex: 1; }
        .family-widget-title { font-size: 1.0625rem; font-weight: 700; color: var(--text-primary); margin-bottom: 5px; letter-spacing: -0.02em; }
        .family-widget-desc { font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5; }
        .family-widget-benefit { font-size: 0.8125rem; color: var(--text-tertiary); margin-top: 6px; }
        .family-widget-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; flex-shrink: 0; }
        .family-widget-btn { padding: 10px 20px; background: var(--accent, #8FE62C); color: #111; border: none; border-radius: 10px; font-size: 0.875rem; font-weight: 700; cursor: pointer; transition: all 0.16s; text-decoration: none; display: inline-block; font-family: var(--font); white-space: nowrap; }
        .family-widget-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .family-widget-skip { font-size: 0.8125rem; font-weight: 500; color: var(--text-tertiary); background: none; border: none; cursor: pointer; font-family: var(--font); padding: 0; white-space: nowrap; transition: color 0.16s; }
        .family-widget-skip:hover { color: var(--text-secondary); }
        .family-widget-dismiss { position: absolute; top: 14px; right: 14px; width: 28px; height: 28px; border-radius: 50%; background: var(--hover-bg); border: none; color: var(--text-tertiary); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.16s; }
        .family-widget-dismiss:hover { background: var(--border); color: var(--text-primary); }


        /* ── Skeleton ────────────────────────────────────────────────────── */
        .wos-skeleton-line { display: block; background: linear-gradient(90deg, var(--border) 25%, var(--hover-bg) 50%, var(--border) 75%); background-size: 600px 100%; animation: wos-shimmer 1.5s infinite linear; border-radius: 6px; color: transparent !important; min-height: 18px; }

        /* ── Empty state helper ──────────────────────────────────────────── */
        .empty-state-box { text-align: center; padding: 36px 20px; }
        .empty-state-box-icon { font-size: 2.25rem; margin-bottom: 10px; opacity: 0.45; }
        .empty-state-box-text { font-size: 0.9375rem; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state-box-link { font-size: 0.875rem; font-weight: 600; color: var(--accent-dark, #5FA518); text-decoration: none; }
        .empty-state-box-link:hover { text-decoration: underline; }
        .example-cta-link { font-size: 0.8125rem; font-weight: 700; color: var(--accent-dark, #5FA518); text-decoration: none; border: 1.5px solid var(--accent-dark, #5FA518); padding: 5px 16px; border-radius: 20px; transition: all 0.15s; display: inline-block; }
        .example-cta-link:hover { background: var(--accent-dark, #5FA518); color: #fff; }
        [data-theme="dark"] .example-cta-link { color: var(--accent, #8FE62C); border-color: var(--accent, #8FE62C); }

        /* ── Modal ───────────────────────────────────────────────────────── */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; animation: wos-fade-in 0.2s ease both; }
        .modal { background: var(--card-light-bg); border-radius: var(--card-radius, 14px); padding: 40px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: wos-scale-in 0.28s cubic-bezier(0.22,1,0.36,1) both; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-title { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.03em; }
        .modal-close { width: 36px; height: 36px; border-radius: 50%; background: var(--hover-bg); border: none; cursor: pointer; font-size: 1.25rem; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; transition: background 0.14s; }
        .modal-close:hover { background: var(--border); color: var(--text-primary); }
        .modal-body { margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
        .form-input, .form-select { width: 100%; padding: 12px 16px; font-size: 0.9375rem; font-family: var(--font); border: 1.5px solid var(--border-strong); border-radius: 10px; background: var(--input-bg); color: var(--text-primary); transition: border-color 0.14s; outline: none; }
        .form-input:focus, .form-select:focus { border-color: var(--accent, #8FE62C); box-shadow: 0 0 0 3px rgba(143,230,44,0.15); }
        .modal-footer { display: flex; gap: 12px; justify-content: flex-end; }
        .btn { padding: 12px 24px; border-radius: 10px; font-size: 0.9375rem; font-weight: 600; cursor: pointer; transition: all 0.14s; border: none; font-family: var(--font); }
        .btn-primary { background: var(--cta-bg, #8FE62C); color: var(--cta-text, #111); }
        .btn-primary:hover { filter: brightness(1.08); }
        .btn-secondary { background: var(--hover-bg); color: var(--text-primary); border: 1px solid var(--border-strong); }
        .btn-secondary:hover { background: var(--border); }

        /* ── Setup banner ────────────────────────────────────────────────── */
        #setupBanner { background: var(--card-light-bg); border: 1px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }

        /* ── Empty state helper ──────────────────────────────────────────── */
        .empty-state-box { text-align: center; padding: 36px 20px; }
        .empty-state-box-icon { font-size: 2.25rem; margin-bottom: 10px; opacity: 0.45; }
        .empty-state-box-text { font-size: 0.9375rem; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state-box-link { font-size: 0.875rem; font-weight: 600; color: var(--accent-dark, #5FA518); text-decoration: none; }
        .empty-state-box-link:hover { text-decoration: underline; }

        /* ── Setup Journey (onboarding timeline) ────────────────────────────── */
        .setup-stack-wrap { grid-column: span 12; }
        .journey-card { background: var(--card-light-bg); border-radius: var(--card-radius, 14px); border: 1px solid var(--border); padding: 24px 28px; box-shadow: var(--card-light-shadow); }
        .journey-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .journey-title { font-size: 1rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
        .journey-count { font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
        .journey-count strong { color: var(--accent-dark, #5FA518); }
        [data-theme="dark"] .journey-count strong { color: var(--accent, #8FE62C); }
        .journey-progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 22px; overflow: hidden; }
        .journey-progress-bar-fill { height: 100%; background: var(--accent, #8FE62C); border-radius: 2px; transition: width 0.6s ease; }
        .journey-steps { display: flex; flex-direction: column; }
        .journey-step { display: flex; gap: 16px; }
        .journey-spine { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 28px; }
        .journey-node {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; transition: background 0.2s;
        }
        .journey-node--done { background: var(--accent, #8FE62C); color: #111; font-size: 0.875rem; }
        .journey-node--pending { border: 2px solid var(--border-strong); background: var(--card-light-bg); color: var(--text-secondary); }
        .journey-connector { width: 2px; flex: 1; min-height: 12px; margin: 2px 0; border-radius: 1px; transition: background 0.3s; }
        .journey-connector--done { background: var(--accent, #8FE62C); }
        .journey-connector--pending { background: var(--border); }
        .journey-body { flex: 1; padding-bottom: 18px; display: flex; align-items: flex-start; gap: 12px; padding-top: 2px; }
        .journey-step:last-child .journey-body { padding-bottom: 0; }
        .journey-step-icon { font-size: 1.125rem; flex-shrink: 0; line-height: 1; margin-top: 2px; }
        .journey-step-text { flex: 1; min-width: 0; }
        .journey-step-title { font-size: 0.9375rem; font-weight: 600; color: var(--text-primary); display: block; }
        .journey-step-title--done { text-decoration: line-through; color: var(--text-tertiary); }
        .journey-step-sub { font-size: 0.8125rem; color: var(--text-secondary); margin-top: 1px; line-height: 1.4; }
        .journey-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .journey-cta { font-size: 0.8125rem; font-weight: 700; color: var(--accent-dark, #5FA518); text-decoration: none; white-space: nowrap; transition: opacity 0.15s; }
        .journey-cta:hover { opacity: 0.75; }
        [data-theme="dark"] .journey-cta { color: var(--accent, #8FE62C); }
        .journey-skip { font-size: 0.75rem; color: var(--text-tertiary); background: none; border: none; cursor: pointer; font-family: var(--font); padding: 0; white-space: nowrap; transition: color 0.15s; }
        .journey-skip:hover { color: var(--text-secondary); text-decoration: underline; }

        /* ── Example data: metric cards ─────────────────────────────────────── */
        .metric-card--example { position: relative; }
        .metric-card--example .metric-value { color: var(--text-secondary); }
        .metric-card--example .metric-trend { opacity: 0.6; }
        .metric-example-badge {
            display: inline-block; font-size: 0.5rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--text-tertiary); background: var(--border);
            padding: 2px 7px; border-radius: 20px; margin-bottom: 6px;
        }
        .metric-example-cta {
            font-size: 0.6875rem; font-weight: 700; color: var(--accent-dark, #5FA518);
            text-decoration: none; border: 1px solid var(--accent-dark, #5FA518);
            padding: 4px 12px; border-radius: 20px; display: inline-block; margin-top: 6px;
            transition: all 0.15s;
        }
        .metric-example-cta:hover { background: var(--accent-dark, #5FA518); color: #fff; }
        [data-theme="dark"] .metric-example-cta { color: var(--accent, #8FE62C); border-color: var(--accent, #8FE62C); }

        /* ── Example data: charts ────────────────────────────────────────────── */
        .chart-example-wrap { position: relative; }
        .chart-example-label {
            position: absolute; top: 8px; right: 8px;
            font-size: 0.5rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
            color: var(--text-tertiary); background: var(--border); padding: 2px 8px; border-radius: 20px;
        }
        .chart-example-cta-wrap {
            display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: 14px;
        }
        .chart-example-note { font-size: 0.8125rem; color: var(--text-tertiary); }
        .chart-example-link {
            font-size: 0.8125rem; font-weight: 700; color: var(--accent-dark, #5FA518);
            text-decoration: none; border: 1.5px solid var(--accent-dark, #5FA518);
            padding: 5px 16px; border-radius: 20px; transition: all 0.15s;
        }
        .chart-example-link:hover { background: var(--accent-dark, #5FA518); color: #fff; }
        [data-theme="dark"] .chart-example-link { color: var(--accent, #8FE62C); border-color: var(--accent, #8FE62C); }

        /* ── Responsive ──────────────────────────────────────────────────── */
        @media (max-width: 1280px) { .mid-row { grid-template-columns: 1fr; } .activity-card, .allocation-card { grid-column: span 6; } }
        @media (max-width: 900px) {
            .cashflow-top { flex-direction: column; gap: 16px; }
            .cashflow-rate-hero { text-align: left; align-items: flex-start; }
            .family-setup-widget { flex-direction: column; align-items: flex-start; }
            .family-widget-actions { flex-direction: row; align-items: center; width: 100%; justify-content: space-between; }
        }
        @media (max-width: 768px) {
            .app-container { grid-template-columns: 1fr; }
            .main-content { padding: 16px; overflow-x: hidden; }
            .activity-card, .allocation-card { grid-column: span 12; }
            .top-bar { flex-direction: column; gap: 16px; }
            .cashflow-card { padding: 20px; }
            .cashflow-header { flex-wrap: wrap; gap: 10px; }
            .cashflow-income-value { font-size: 1.875rem; }
            .cashflow-rate-value { font-size: 2.25rem; }
            .cashflow-row-amount { width: 76px; }
            .cashflow-row-icon { display: none; }
        }
        @media (max-width: 480px) {
            .page-title { font-size: 1.5rem; }
            .cashflow-row-delta { display: none; }
            .cashflow-month-nav-label { min-width: 90px; font-size: 0.8125rem; }
        }
    </style>
</head>

    <!-- Modals -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/supabase-client.js"></script>
    <script src="api.js"></script>
    <script>
        function fmt(v) { return WealthAPI.formatCurrency(v || 0); }

        var ASSET_COLOR_MAP = { 'Equity':'#3B73FF','Debt':'#6B6B6B','Hybrid':'#FF9500','Cash':'#5DC840','Real Estate':'#5DC840','Commodity':'#d97706','Gold':'#d97706','Other':'#ABABAB' };
        var currentYear, currentMonth, allFamilyMembers = [], currentDashboardMemberId = null, _dashFirstName = '', _totalLiabilities = 0;

        // ── Month navigation ──────────────────────────────────────────────────
        function updateMonthNavLabel(year, month) {
            const label = document.getElementById('monthNavLabel');
            if (!label) return;
            label.textContent = new Date(year, month - 1, 1).toLocaleString('en-IN', { month: 'long', year: 'numeric' });
        }

        function initMonthNav(year, month) {
            currentYear = year; currentMonth = month;
            updateMonthNavLabel(year, month);
            document.getElementById('prevMonthBtn').addEventListener('click', () => navigateMonth(-1));
            document.getElementById('nextMonthBtn').addEventListener('click', () => navigateMonth(1));
        }

        function navigateMonth(delta) {
            let m = currentMonth + delta, y = currentYear;
            if (m > 12) { m = 1; y++; } if (m < 1) { m = 12; y--; }
            currentYear = y; currentMonth = m;
            updateMonthNavLabel(y, m);
            loadMonthData(y, m);
        }

        // ── Cashflow card ─────────────────────────────────────────────────────
        function cashflowRow(icon, label, value, totalIncome, color, prevValue, prevIncome) {
            const pct = totalIncome > 0 ? Math.round((value / totalIncome) * 100) : 0;
            let deltaHtml;
            if (prevIncome > 0) {
                const prevPct = Math.round((prevValue / prevIncome) * 100);
                const diff = pct - prevPct;
                if (diff > 0) deltaHtml = `<span class="cashflow-row-delta up">↑ ${diff}pp</span>`;
                else if (diff < 0) deltaHtml = `<span class="cashflow-row-delta down">↓ ${Math.abs(diff)}pp</span>`;
                else deltaHtml = `<span class="cashflow-row-delta neutral">→ 0pp</span>`;
            } else { deltaHtml = `<span class="cashflow-row-delta neutral">—</span>`; }
            return `<div class="cashflow-row">
                <span class="cashflow-row-icon">${icon}</span>
                <span class="cashflow-row-label">${label}</span>
                <div class="cashflow-bar-wrap"><div class="cashflow-bar-fill" style="width:${Math.min(100,pct)}%;background:${color};"></div></div>
                <span class="cashflow-row-amount">${fmt(value)}</span>
                <span class="cashflow-row-pct">${pct}%</span>
                ${deltaHtml}
            </div>`;
        }

        function renderCashflowCard(income, expenses, investments, prevIncome, prevExpenses, prevInvestments, monthLabel) {
            const card = document.getElementById('cashflowCard');
            if (!card) return;

            // Update month label in the inline nav
            const navLabel = document.getElementById('monthNavLabel');
            if (navLabel && monthLabel) navLabel.textContent = monthLabel;

            const incomeValueEl = card.querySelector('.cashflow-income-value');
            const rowsEl = document.getElementById('cashflowRows');

            if (!income || income <= 0) {
                // Example / empty state — preserve header, update body only
                const si = 110000, se = 65000, sv = 45000;
                const exRow = (icon, label, value, base, color) => {
                    const p = Math.round((value / base) * 100);
                    return `<div class="cashflow-row">
                        <span class="cashflow-row-icon">${icon}</span>
                        <span class="cashflow-row-label">${label}</span>
                        <div class="cashflow-bar-wrap"><div class="cashflow-bar-fill" style="width:${p}%;background:${color};opacity:0.5;"></div></div>
                        <span class="cashflow-row-amount" style="opacity:0.5;">${fmt(value)}</span>
                        <span class="cashflow-row-pct" style="opacity:0.5;">${p}%</span>
                        <span class="cashflow-row-delta neutral">—</span>
                    </div>`;
                };
                if (incomeValueEl) { incomeValueEl.textContent = fmt(si); incomeValueEl.style.opacity = '0.45'; }
                const rateEl = document.getElementById('cashflowRateValue');
                if (rateEl) { rateEl.innerHTML = '<span style="opacity:0.4;color:var(--accent,#8FE62C);">41%</span>'; }
                card.classList.remove('savings-excellent','savings-good','savings-poor');
                if (!card.querySelector('.cashflow-example-badge')) {
                    const badge = document.createElement('span');
                    badge.className = 'cashflow-example-badge'; badge.textContent = 'Example';
                    card.appendChild(badge);
                }
                if (rowsEl) rowsEl.innerHTML =
                    exRow('📉', 'Expenditure',         se, si, 'var(--viz-expense, #FF9500)') +
                    exRow('📈', 'Savings & Investments', sv, si, 'var(--viz-growth, #8FE62C)') +
                    `<div style="margin-top:14px;"><a href="monthly-tracker.html" class="example-cta-link">Track this month →</a></div>`;
                return;
            }

            // Remove example badge if present
            const badge = card.querySelector('.cashflow-example-badge');
            if (badge) badge.remove();

            // investments field in DB = Savings & Investments (auto-calc: income − expenditure)
            const savingsRate = income > 0 ? Math.round((investments / income) * 100) : 0;

            // Update income value
            if (incomeValueEl) { incomeValueEl.textContent = fmt(income); incomeValueEl.style.opacity = ''; }

            // Update savings rate display + thumbs up
            const rateEl = document.getElementById('cashflowRateValue');
            card.classList.remove('savings-excellent','savings-good','savings-poor');
            if (rateEl) {
                let thumbHtml = '';
                if (savingsRate >= 30) {
                    card.classList.add('savings-excellent');
                    thumbHtml = `<span class="cashflow-thumb animate">👍</span>`;
                } else if (savingsRate >= 20) {
                    card.classList.add('savings-good');
                    thumbHtml = `<span class="cashflow-thumb animate">👍</span>`;
                } else if (savingsRate < 10) {
                    card.classList.add('savings-poor');
                }
                rateEl.innerHTML = savingsRate + '%' + thumbHtml;
            }

            // Two rows matching monthly tracker: Expenditure + Savings & Investments
            if (rowsEl) rowsEl.innerHTML =
                cashflowRow('📉', 'Expenditure',          expenses,    income, 'var(--viz-expense, #FF9500)',  prevExpenses,    prevIncome) +
                cashflowRow('📈', 'Savings & Investments', investments, income, 'var(--viz-growth, #8FE62C)',   prevInvestments, prevIncome);
        }

        // ── Portfolio summary ─────────────────────────────────────────────────
        function renderPortfolioSummary(netWorth, byAssetClass, totalLiabilities) {
            const container = document.getElementById('psContent');
            if (!container) return;
            if (!netWorth && (!byAssetClass || byAssetClass.length === 0)) {
                const sample = [
                    { class:'Equity', pct:60, value:2052000 }, { class:'Debt', pct:25, value:855000 },
                    { class:'Gold',   pct:10, value:342000  }, { class:'Other', pct:5,  value:171000 },
                ];
                container.innerHTML = `
                    <span class="ps-example-badge">Example</span>
                    <div class="ps-networth" style="color:var(--text-secondary);">₹34.2L</div>
                    <div class="ps-networth-label">Total Net Worth</div>
                    <div class="ps-allocation-list">${sample.map(item => {
                        const color = ASSET_COLOR_MAP[item.class] || '#ABABAB';
                        return `<div class="ps-row">
                            <span class="ps-dot" style="background:${color};opacity:0.5;"></span>
                            <span class="ps-class" style="color:var(--text-secondary);">${item.class}</span>
                            <div class="ps-bar-wrap"><div class="ps-bar-fill" style="width:${item.pct}%;background:${color};opacity:0.4;"></div></div>
                            <span class="ps-pct" style="color:var(--text-secondary);">${item.pct}%</span>
                            <span class="ps-val">${fmt(item.value)}</span>
                        </div>`;
                    }).join('')}</div>
                    <div style="margin-top:16px;"><a href="portfolio.html" class="example-cta-link">Add portfolio →</a></div>`;
                return;
            }
            const networthLabel = totalLiabilities > 0 ? 'Net Worth (Assets − Debt)' : 'Total Net Worth';
            container.innerHTML = `
                <div class="ps-networth">${fmt(netWorth)}</div>
                <div class="ps-networth-label">${networthLabel}</div>
                <div class="ps-allocation-list">${(byAssetClass || []).map(item => {
                    const color = ASSET_COLOR_MAP[item.class] || '#ABABAB';
                    const pct = Math.round(item.pct || 0);
                    return `<div class="ps-row">
                        <span class="ps-dot" style="background:${color};"></span>
                        <span class="ps-class">${item.class}</span>
                        <div class="ps-bar-wrap"><div class="ps-bar-fill" style="width:${pct}%;background:${color};"></div></div>
                        <span class="ps-pct">${pct}%</span>
                        <span class="ps-val">${fmt(item.value)}</span>
                    </div>`;
                }).join('')}</div>`;
        }

        // ── Goals compact ─────────────────────────────────────────────────────
        function renderGoalsCompact(goals) {
            const container = document.getElementById('goalsCompactList');
            if (!container) return;
            const iconMap = { House:'🏠', Education:'🎓', Vacation:'🏖️', Vehicle:'🚗', Retirement:'🌴', Emergency:'🛡️' };
            if (!goals || goals.length === 0) {
                const sample = [
                    { name:'House', type:'House', progressPct:62, isOnTrack:true,  monthsRemaining:18 },
                    { name:'Emergency Fund', type:'Emergency', progressPct:40, isOnTrack:false, monthsRemaining:8 },
                ];
                container.innerHTML = `<span class="gs-example-badge">Example</span>` +
                    sample.map(g => {
                        const p = Math.round(g.progressPct);
                        return `<div class="goal-compact-row" style="opacity:0.55;">
                            <span class="goal-compact-icon">${iconMap[g.type] || '🎯'}</span>
                            <div class="goal-compact-body">
                                <div class="goal-compact-name">${g.name}</div>
                                <div class="goal-compact-bar"><div class="goal-compact-bar-fill" style="width:${p}%;"></div></div>
                            </div>
                            <div class="goal-compact-right">
                                <span class="goal-compact-pct">${p}%</span>
                                <span class="wos-badge ${g.isOnTrack ? 'positive' : 'negative'}">${g.isOnTrack ? 'On track' : 'Behind'}</span>
                                <span class="goal-compact-time">${g.monthsRemaining} mo</span>
                            </div>
                        </div>`;
                    }).join('') +
                    `<div style="margin-top:12px;"><a href="goals.html" class="gs-empty-cta">Create your first goal →</a></div>`;
                return;
            }
            container.innerHTML = goals.slice(0, 4).map(goal => {
                const pct = Math.min(100, Math.round(goal.progressPct || 0));
                const timeLeft = goal.monthsRemaining != null ? goal.monthsRemaining + ' mo' : '—';
                return `<div class="goal-compact-row" onclick="location.href='goals.html'">
                    <span class="goal-compact-icon">${iconMap[goal.type] || '🎯'}</span>
                    <div class="goal-compact-body">
                        <div class="goal-compact-name">${goal.name || 'Goal'}</div>
                        <div class="goal-compact-bar"><div class="goal-compact-bar-fill" style="width:${pct}%;"></div></div>
                    </div>
                    <div class="goal-compact-right">
                        <span class="goal-compact-pct">${pct}%</span>
                        <span class="wos-badge ${goal.isOnTrack ? 'positive' : 'negative'}">${goal.isOnTrack ? 'On track' : 'Behind'}</span>
                        <span class="goal-compact-time">${timeLeft}</span>
                    </div>
                </div>`;
            }).join('');
        }

        // ── Load month data (called on nav) ──────────────────────────────────
        async function loadMonthData(year, month) {
            const prevM = month === 1 ? 12 : month - 1;
            const prevY = month === 1 ? year - 1 : year;
            const monthLabel = new Date(year, month - 1, 1).toLocaleString('en-IN', { month: 'long', year: 'numeric' });
            const [monthData, prevMonthData, portfolio] = await Promise.all([
                WealthAPI.monthly.getMonth(year, month).catch(() => []),
                WealthAPI.monthly.getMonth(prevY, prevM).catch(() => []),
                WealthAPI.portfolio.summary(year, month).catch(() => null),
            ]);
            const members = Array.isArray(monthData) ? monthData : [];
            const prevMembers = Array.isArray(prevMonthData) ? prevMonthData : [];
            const income      = members.reduce((s, m) => s + (m.income      || 0), 0);
            const expenses    = members.reduce((s, m) => s + (m.expenditure || 0), 0);
            const investments = members.reduce((s, m) => s + (m.investments || 0), 0);
            const prevIncome      = prevMembers.reduce((s, m) => s + (m.income      || 0), 0);
            const prevExpenses    = prevMembers.reduce((s, m) => s + (m.expenditure || 0), 0);
            const prevInvestments = prevMembers.reduce((s, m) => s + (m.investments || 0), 0);
            const netWorth    = (portfolio ? (portfolio.totalNetWorth || 0) : 0) - _totalLiabilities;
            const byAssetClass = portfolio ? (portfolio.byAssetClass  || []) : [];
            renderCashflowCard(income, expenses, investments, prevIncome, prevExpenses, prevInvestments, monthLabel);
            renderPortfolioSummary(netWorth, byAssetClass, _totalLiabilities);
            return { income, expenses, investments, netWorth, byAssetClass, members };
        }



        // ── Modals ────────────────────────────────────────────────────────────
        function openAssetModal()  { document.getElementById('assetModal').classList.add('active'); }
        function openBudgetModal() { document.getElementById('budgetModal').classList.add('active'); }
        function openGoalModal()   { document.getElementById('goalModal').classList.add('active'); }
        function closeModal(id)    { document.getElementById(id).classList.remove('active'); }
        document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); }));
        function submitAsset()  { const f = document.getElementById('assetForm');  if (f.checkValidity()) { closeModal('assetModal');  f.reset(); } else f.reportValidity(); }
        function submitBudget() { const f = document.getElementById('budgetForm'); if (f.checkValidity()) { closeModal('budgetModal'); f.reset(); } else f.reportValidity(); }
        function submitGoal()   { const f = document.getElementById('goalForm');   if (f.checkValidity()) { closeModal('goalModal');   f.reset(); } else f.reportValidity(); }
        function handleLogout() { WealthAPI.auth.logout(); }

        // ── Setup Journey ─────────────────────────────────────────────────────
        var SETUP_STEPS = [
            { id:'family',   icon:'👨‍👩‍👧‍👦', title:'Setup your account',             sub:'Add your profile details, add family members etc for easier tracking', cta:'Set up →',       href:'/family-setup.html'       },
            { id:'monthly',  icon:'📊',       title:'Track Monthly Income, Expenses etc.', sub:'Log income and expenses each month to know your savings rate.',  cta:'Track →',        href:'/monthly-tracker.html'    },
            { id:'portfolio',icon:'💼',       title:'Track your portfolio',          sub:'Add all your assets to see your true net worth and allocation.',     cta:'Add assets →',   href:'/portfolio.html'          },
            { id:'goals',    icon:'🎯',       title:'Set up your goals',             sub:'Define what you\'re saving for — home, education, retirement.',      cta:'Add goals →',    href:'/goals.html'              },
            { id:'savings',  icon:'🔥',       title:'Build your life plan',          sub:'Set your FIRE target and see when you can reach financial freedom.', cta:'Open →',         href:'/fire.html'               },
            { id:'planning', icon:'📋',       title:'See the financial plan',        sub:'Get a full projection of your net worth, taxes, and retirement.',    cta:'View plan →',    href:'/financial-planning.html' }
        ];

        var _setupProg = null;

        async function skipSetupStep(stepId) {
            try {
                await WealthAPI.setup.markStep(stepId, 1);
                const prog = await WealthAPI.setup.getProgress();
                _setupProg = prog;
                renderSetupJourney(prog);
            } catch(e) { console.error('Skip step error:', e); }
        }

        function renderSetupJourney(prog) {
            const section = document.getElementById('ftuxNudgeSection');
            if (!section) return;
            if (!prog) { section.style.display = 'none'; return; }
            const isDone = id => {
                const map = { family:'familyDone', monthly:'monthlyDone', portfolio:'portfolioDone', goals:'goalsDone', savings:'savingsDone', planning:'planningDone' };
                return !!(prog[map[id]]);
            };
            const doneCount = SETUP_STEPS.filter(s => isDone(s.id)).length;
            if (doneCount === SETUP_STEPS.length) { section.style.display = 'none'; return; }
            section.style.display = '';
            const pct = Math.round((doneCount / SETUP_STEPS.length) * 100);
            const stepsHtml = SETUP_STEPS.map((step, i) => {
                const done = isDone(step.id);
                const isLast = i === SETUP_STEPS.length - 1;
                const nodeHtml = done
                    ? `<div class="journey-node journey-node--done">✓</div>`
                    : `<div class="journey-node journey-node--pending">${i + 1}</div>`;
                const connectorClass = done ? 'journey-connector--done' : 'journey-connector--pending';
                const titleClass = done ? 'journey-step-title journey-step-title--done' : 'journey-step-title';
                const actionsHtml = done
                    ? `<a href="${step.href}" class="journey-cta">${step.cta}</a>`
                    : `<a href="${step.href}" class="journey-cta">${step.cta}</a>
                       <button class="journey-skip" onclick="skipSetupStep('${step.id}')">Skip</button>`;
                return `<div class="journey-step">
                    <div class="journey-spine">
                        ${nodeHtml}
                        ${!isLast ? `<div class="journey-connector ${connectorClass}"></div>` : ''}
                    </div>
                    <div class="journey-body">
                        <span class="journey-step-icon">${step.icon}</span>
                        <div class="journey-step-text">
                            <span class="${titleClass}">${step.title}</span>
                            <div class="journey-step-sub">${step.sub}</div>
                        </div>
                        <div class="journey-actions">${actionsHtml}</div>
                    </div>
                </div>`;
            }).join('');
            section.innerHTML = `<div class="journey-card">
                <div class="journey-header">
                    <div class="journey-title">Get started</div>
                    <div class="journey-count"><strong>${doneCount} of ${SETUP_STEPS.length}</strong> complete</div>
                </div>
                <div class="journey-progress-bar-wrap"><div class="journey-progress-bar-fill" style="width:${pct}%"></div></div>
                <div class="journey-steps">${stepsHtml}</div>
            </div>`;
        }

        // ── Person tabs ───────────────────────────────────────────────────────
        function buildDashboardPersonTabs(members) {
            const container = document.getElementById('personTabsContainer');
            const tabsList  = document.getElementById('personTabsList');
            if (!members || members.length < 2) { if (container) container.style.display = 'none'; return; }
            if (!container || !tabsList) return;
            tabsList.innerHTML = '';
            const overall = document.createElement('button');
            overall.className = 'person-tab overall-tab active'; overall.dataset.memberId = 'overall'; overall.textContent = 'Overall';
            overall.addEventListener('click', () => switchDashboardMember('overall'));
            tabsList.appendChild(overall);
            members.forEach(m => {
                const btn = document.createElement('button');
                btn.className = 'person-tab'; btn.dataset.memberId = m.id; btn.textContent = m.name;
                btn.addEventListener('click', () => switchDashboardMember(m.id));
                tabsList.appendChild(btn);
            });
            container.style.display = '';
        }

        async function switchDashboardMember(memberId) {
            currentDashboardMemberId = memberId === 'overall' ? null : memberId;
            document.querySelectorAll('#personTabsList .person-tab').forEach(t => t.classList.toggle('active', t.dataset.memberId === String(memberId)));
            const year = currentYear, month = currentMonth;
            const prevM = month === 1 ? 12 : month - 1, prevY = month === 1 ? year - 1 : year;
            const monthLabel = new Date(year, month - 1, 1).toLocaleString('en-IN', { month: 'long', year: 'numeric' });
            let income = 0, expenses = 0, investments = 0, memberMonthData = [];
            let prevIncome = 0, prevExpenses = 0, prevInvestments = 0, netWorth = 0, byAssetClass = [];
            if (currentDashboardMemberId === null) {
                const [data, prevData, portfolio] = await Promise.all([
                    WealthAPI.monthly.getMonth(year, month).catch(() => []),
                    WealthAPI.monthly.getMonth(prevY, prevM).catch(() => []),
                    WealthAPI.portfolio.summary(year, month).catch(() => null),
                ]);
                memberMonthData = Array.isArray(data) ? data : [];
                const prevMems = Array.isArray(prevData) ? prevData : [];
                income = memberMonthData.reduce((s, m) => s + (m.income || 0), 0);
                expenses = memberMonthData.reduce((s, m) => s + (m.expenditure || 0), 0);
                investments = memberMonthData.reduce((s, m) => s + (m.investments || 0), 0);
                prevIncome = prevMems.reduce((s, m) => s + (m.income || 0), 0);
                prevExpenses = prevMems.reduce((s, m) => s + (m.expenditure || 0), 0);
                prevInvestments = prevMems.reduce((s, m) => s + (m.investments || 0), 0);
                netWorth = (portfolio ? (portfolio.totalNetWorth || 0) : 0) - _totalLiabilities;
                byAssetClass = portfolio ? (portfolio.byAssetClass || []) : [];
            } else {
                const [data, prevData, memberAssets] = await Promise.all([
                    WealthAPI.monthly.getMemberMonth(year, month, currentDashboardMemberId).catch(() => null),
                    WealthAPI.monthly.getMemberMonth(prevY, prevM, currentDashboardMemberId).catch(() => null),
                    WealthAPI.portfolio.getMember(currentDashboardMemberId, year, month).catch(() => []),
                ]);
                memberMonthData = data ? [data] : [];
                income = data ? (data.income || 0) : 0; expenses = data ? (data.expenditure || 0) : 0; investments = data ? (data.investments || 0) : 0;
                prevIncome = prevData ? (prevData.income || 0) : 0; prevExpenses = prevData ? (prevData.expenditure || 0) : 0; prevInvestments = prevData ? (prevData.investments || 0) : 0;
                const assetList = Array.isArray(memberAssets) ? memberAssets : [];
                netWorth = assetList.reduce((s, a) => s + (a.currentValue || 0), 0);
                byAssetClass = computeAllocationFromAssets(assetList);
            }
            renderCashflowCard(income, expenses, investments, prevIncome, prevExpenses, prevInvestments, monthLabel);
            renderPortfolioSummary(netWorth, byAssetClass, currentDashboardMemberId === null ? _totalLiabilities : 0);
        }

        // ── Main init ─────────────────────────────────────────────────────────
        async function initDashboard() {
            if (!(await WealthAPI.auth.requireAuth())) return;
            WealthProgress.start();
            const user = await WealthAPI.auth.getUser();
            if (user) {
                const fullName = user.name || user.fullName || '';
                const firstName = fullName ? fullName.split(' ')[0] : '';
                const familyName = user.familyName || '';
                const fallback = familyName && familyName !== 'My Family' ? familyName : (user.email || '').split('@')[0];
                _dashFirstName = firstName || fallback;
                document.getElementById('pageTitle').textContent = _dashFirstName ? 'Welcome, ' + _dashFirstName : 'Dashboard';
            }
            const { year, month } = WealthAPI.getCurrentYearMonth();
            initMonthNav(year, month);
            const prevM = month === 1 ? 12 : month - 1, prevY = month === 1 ? year - 1 : year;
            const monthLabel = new Date(year, month - 1, 1).toLocaleString('en-IN', { month: 'long', year: 'numeric' });
            const [monthData, prevMonthData, portfolio, goals, familyMembers, setupProg, liabData] = await Promise.all([
                WealthAPI.monthly.getMonth(year, month).catch(() => []),
                WealthAPI.monthly.getMonth(prevY, prevM).catch(() => []),
                WealthAPI.portfolio.summary(year, month).catch(() => null),
                WealthAPI.goals.getAll().catch(() => []),
                WealthAPI.family.getMembers().catch(() => []),
                WealthAPI.setup.getProgress().catch(() => null),
                WealthAPI.liabilities.getAll().catch(() => null),
            ]);
            _totalLiabilities = liabData?.summary?.totalOutstanding || 0;
            allFamilyMembers = familyMembers || [];
            buildDashboardPersonTabs(allFamilyMembers);
            const members = Array.isArray(monthData) ? monthData : [];
            const prevMems = Array.isArray(prevMonthData) ? prevMonthData : [];
            const income = members.reduce((s, m) => s + (m.income || 0), 0);
            const expenses = members.reduce((s, m) => s + (m.expenditure || 0), 0);
            const investments = members.reduce((s, m) => s + (m.investments || 0), 0);
            const prevIncome = prevMems.reduce((s, m) => s + (m.income || 0), 0);
            const prevExpenses = prevMems.reduce((s, m) => s + (m.expenditure || 0), 0);
            const prevInvestments = prevMems.reduce((s, m) => s + (m.investments || 0) , 0);
            const netWorth = (portfolio ? (portfolio.totalNetWorth || 0) : 0) - _totalLiabilities;
            const byAssetClass = portfolio ? (portfolio.byAssetClass || []) : [];
            renderCashflowCard(income, expenses, investments, prevIncome, prevExpenses, prevInvestments, monthLabel);
            renderPortfolioSummary(netWorth, byAssetClass, _totalLiabilities);
            renderGoalsCompact(goals);
            // Auto-detect completion and write back to DB if needed
            const hasMonthlyData = income > 0 || expenses > 0;
            const hasPortfolioEntries = byAssetClass.length > 0;
            const hasFamilySetup = allFamilyMembers.length > 1;
            const hasGoals = Array.isArray(goals) && goals.length > 0;
            if (setupProg) {
                const writes = [];
                if (hasFamilySetup && !setupProg.familyDone) writes.push(WealthAPI.setup.markStep('family', 1));
                if (hasMonthlyData && !setupProg.monthlyDone) writes.push(WealthAPI.setup.markStep('monthly', 1));
                if (hasPortfolioEntries && !setupProg.portfolioDone) writes.push(WealthAPI.setup.markStep('portfolio', 1));
                if (hasGoals && !setupProg.goalsDone) writes.push(WealthAPI.setup.markStep('goals', 1));
                if (writes.length) {
                    await Promise.all(writes).catch(() => {});
                    const fresh = await WealthAPI.setup.getProgress().catch(() => setupProg);
                    _setupProg = fresh;
                    renderSetupJourney(fresh);
                } else {
                    _setupProg = setupProg;
                    renderSetupJourney(setupProg);
                }
            } else {
                document.getElementById('ftuxNudgeSection').style.display = 'none';
            }
            document.querySelectorAll('#dashboardGrid > *').forEach((el, i) => {
                el.classList.add('wos-reveal'); el.style.transitionDelay = (i * 0.05) + 's';
            });
            const obs = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
            }, { threshold: 0.05 });
            document.querySelectorAll('#dashboardGrid > *').forEach(el => obs.observe(el));
            WealthProgress.done();
        }


        initDashboard().catch(err => console.error('Dashboard init error:', err));
    </script>
    <script src="sidebar.js"></script>
</body>
</html>
